# Values definitions for AKC Controller

enabled: true
serviceAccountName: "akc-controller"
name: "akc-controller"
replicaCount: 1

image:
  repository: ghcr.io/rdwr-ci-reports/akc-controller
  pullPolicy: IfNotPresent
  tag: 1.8.0

uid: "local_akc"
#use aggregator's default service name ("akc-aggregator") if controller and aggregator running on the same cluster
aggregator_ip: "akc-aggregator.default.svc.cluster.local"
aggregator_port: 30051

controller_reconcile_period: 3600

direct_access: "disable"

cipher_validation: "enable"

informer_monitoring_period: 5

args:
  verbose: 1
  logfile: "/akc/log/akc_controller.log"
  cert: "/var/run/webhook/serving-cert/tls.crt"
  key: "/var/run/webhook/serving-cert/tls.key"

#env variables that can easily be set with '--set aggregator.env.param=value'
env: {}
      
podAnnotations: {}

service:
  type: NodePort

# REST port 
rest_service:
  port: 30080
  nodePort: 30080
  targetPort: 30080

# Validator ports
validator_service:
  port: 8443
  targetport: 8443

securityContext:
  runAsUser:  65534
  runAsGroup: 65534
  fsGroup:  65534
  runAsNonRoot: true
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  
# Validator webhook secret
secret:
  secretname: "alteon-svc-validator-cert"
  crt: ''
  key: ''
# Validator webhook
webhook:
  name: "alteonsvcvalidator.webhook.svc"
  enabled: true
  matchpolicy: "Equivalent"
  apigroups: "[\"*\"]"
  apiversions: "[\"v1\"]"
  path: "/validate"
  port: 8443
  timeout: 5
  failpolicy: "Fail"

grpc_conn:
  is_grpc_encrypted: "enabled"
  
# GRPC  secret
grpc_secret:
  secretname: "akc-grpc-serving-cert"
  ca: ""
  crt: ""
  key: ""
