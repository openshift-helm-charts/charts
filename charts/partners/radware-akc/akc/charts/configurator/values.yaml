# Values definitions for AKC Controller


enabled: false
serviceAccountName: "akc-configurator"
name: "akc-configurator"
replicaCount: 1

image:
  repository: ghcr.io/rdwr-ci-reports/akc-configurator
  pullPolicy: IfNotPresent
  tag: 1.8.0

#configurator (vdirect) parameters
alteon:
  # master_ip: "alteon master ip"
  # backup_ip: "alteon backup ip"
  # adcSecretCredential: "akc-alteon-device-secret"

  user: "admin"
  pass: "admin"
  # pip: "1.1.11.11"
  # pip_mask: "255.255.0.0"

loglevel: "DEBUG"


# REST port 
rest_service:
  port: 30188
  nodePort: 30188
  type: NodePort
  targetPort: 30188

securityContext:
  runAsUser:  65534
  runAsGroup: 65534
  fsGroup:  65534
  runAsNonRoot: true
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

podAnnotations: {}

rest_conn:
  is_rest_encrypted: "enabled"

# REST  secret
rest_secret:
  secretname: "akc-rest-serving-cert"
  ca: ""
  crt: ""
  key: ""
