replicaCount: 1

image:
  repository: quay.io/kubesense/kubesense-api
  pullPolicy: IfNotPresent
  tag: "1.0.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 0

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  runAsNonRoot: true
  runAsUser: 1001

service:
  type: ClusterIP
  port: 3000

config:
  port: "3000"
  allowOrigins: ""
  apiRateLimit: 600
  loginApiRateLimit: 10
  ipBlockTime: 15
  trustedProxies: []
  dashboardHost: "localhost:5173"
  runDbMigrations: false

  database:
    driver: mysql
    host: ""
    port: "3306"
    source: ""
    username: ""
    connMaxLifetime: "1m"
    connMaxIdleTime: "30s"
    maxOpenConns: 50
    maxIdleConns: 10

  tracesStore:
    host: ""
    port: "9000"
    username: "default"

  metricsStore:
    enabled: "true"
    url: ""

  kubecol:
    enabled: false
    llmUrl: "http://kubesense-kubecol:31443"

  kubeaiService: "kubesense-kubeai:3003"
  kubeaiServiceHttp: "kubesense-kubeai:3004"

  logger:
    level: info
    encoding: console
    outputPaths:
      - stdout
    errorOutputPaths:
      - stdout
    maxSize: 300
    maxBackups: 9
    maxAge: 7
    enableCaller: true

  alertmanager:
    enabled: false
    baseUrl: "http://localhost:9093"
    timeout: 30
    configPath: "alertmanager.yaml"
    apiBaseUrl: ""
    smtpSmarthost: ""
    smtpFrom: ""
    smtpAuthUsername: ""
    smtpRequireTls: true

  saml:
    enabled: false
    rootUrl: ""
    entityId: ""
    idpMetadataUrl: ""

# Sensitive values — stored in a Kubernetes Secret
secrets:
  jwtSecret: ""
  databasePassword: ""
  tracesStorePassword: ""
  alertmanagerPassword: ""
  smtpAuthPassword: ""

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}
