apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubesense.fullname" . }}
  labels:
    {{- include "kubesense.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "kubesense.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "kubesense.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kubesense.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubesense.fullname" . }}
                  key: JWT_SECRET
            - name: TESTS_STORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubesense.fullname" . }}
                  key: TESTS_STORE_PASSWORD
            - name: TRACES_STORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubesense.fullname" . }}
                  key: TRACES_STORE_PASSWORD
            - name: ALERTMANAGER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubesense.fullname" . }}
                  key: ALERTMANAGER_PASSWORD
            - name: ALERTMANAGER_SMTP_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubesense.fullname" . }}
                  key: ALERTMANAGER_SMTP_AUTH_PASSWORD
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /opt/kubesense/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: logs
              mountPath: /opt/kubesense/logs
            - name: exports
              mountPath: /opt/kubesense/exports
            - name: vector-data
              mountPath: /vector-data-dir
      volumes:
        - name: config
          configMap:
            name: {{ include "kubesense.fullname" . }}
        - name: logs
          emptyDir: {}
        - name: exports
          emptyDir: {}
        - name: vector-data
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
