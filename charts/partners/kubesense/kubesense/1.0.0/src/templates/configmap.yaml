apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubesense.fullname" . }}-server
  labels:
    {{- include "kubesense.labels" . | nindent 4 }}
data:
  server.py: |
    import http.server
    import json

    class HealthHandler(http.server.BaseHTTPRequestHandler):
        def do_GET(self):
            body = json.dumps({
                "error": False,
                "message": "Health checked successfully",
                "data": {"api_service": "up"}
            }).encode()
            self.send_response(200)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def log_message(self, fmt, *args):
            pass

    http.server.HTTPServer(("", 3000), HealthHandler).serve_forever()
