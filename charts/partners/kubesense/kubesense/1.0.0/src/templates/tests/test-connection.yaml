apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "kubesense.fullname" . }}-test-connection"
  labels:
    {{- include "kubesense.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
  containers:
    - name: wget
      image: registry.access.redhat.com/ubi9/ubi-minimal:latest
      command: ['sh', '-c']
      args:
        - |
          curl -sf http://{{ include "kubesense.fullname" . }}:{{ .Values.service.port }}/api/health || exit 1
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
