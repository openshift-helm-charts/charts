apiVersion: v1
kind: Pod
metadata:
 name: "{{ include "prophaze-waf.fullname" . }}-test"
 labels:
 {{- include "prophaze-waf.labels" . | nindent 4 }}
 annotations:
 "helm.sh/hook": test
spec:
 containers:
 - name: test
 image: registry.access.redhat.com/ubi8/ubi-minimal:latest
 command: ["curl", "--fail"]
 args: ["http://{{ include "prophaze-waf.fullname" . }}:80"]
 restartPolicy: Never
