apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "prophaze-waf.fullname" . }}-test-connection"
  labels:
    {{- include "prophaze-waf.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: registry.access.redhat.com/ubi8/ubi-minimal:latest
      command: ['wget']
      args: ['{{ include "prophaze-waf.fullname" . }}:{{ .Values.service.port }}']
  restartPolicy: Never
